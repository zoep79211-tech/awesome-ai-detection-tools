<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#4F46E5"/>

  <!-- Outer circle -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.35"/>

  <!-- Inner circle -->
  <circle cx="16" cy="16" r="5.5" fill="none" stroke="#ffffff" stroke-width="1.6" opacity="0.7"/>

  <!-- Center dot -->
